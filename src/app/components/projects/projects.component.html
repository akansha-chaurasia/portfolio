<section id="projects" class="projects">
  <div class="container">
    <h2 class="section-title">Featured Projects</h2>
    <div class="projects-list">
      <div *ngFor="let project of projects; let i = index" class="project-card">
        <div class="project-header">
          <h3 class="project-title">{{ project.title }}</h3>
          <span class="project-number">{{ i + 1 }}</span>
        </div>
        <p class="project-description">{{ project.description }}</p>
        
        <div class="project-section">
          <h4 class="subsection-title">Key Achievements</h4>
          <ul class="achievements-list">
            <li *ngFor="let achievement of project.keyAchievements" class="achievement-item">
              {{ achievement }}
            </li>
          </ul>
        </div>
        
        <div class="project-section">
          <h4 class="subsection-title">Technologies Used</h4>
          <div class="tech-tags">
            <span *ngFor="let tech of project.technologies" class="tech-tag">{{ tech }}</span>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
